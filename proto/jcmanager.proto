syntax = "proto3";

package jcmanager.v1;

option go_package = "jcmanager/proto;jcmanagerpb";

service AgentService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (Ack);
  rpc WatchCommands(WatchCommandsRequest) returns (stream Command);
  rpc ReportResult(ReportResultRequest) returns (Ack);
}

message Ack {
  bool ok = 1;
  string message = 2;
  int64 server_time_unix = 3;
}

message RegisterRequest {
  NodeInfo node = 1;
  string token = 2;
  string session_token = 3;
  string install_secret = 4;
}

message RegisterResponse {
  string node_id = 1;
  string display_name = 2;
  int64 registered_at_unix = 3;
  string session_token = 4;
}

message WatchCommandsRequest {
  string node_id = 1;
  string session_token = 2;
}

message HeartbeatRequest {
  NodeStatus status = 1;
  string session_token = 2;
}

message ReportResultRequest {
  CommandResult result = 1;
  string session_token = 2;
}

message NodeInfo {
  string node_id = 1;
  string hostname = 2;
  string display_name = 3;
  string primary_ip = 4;
  string os = 5;
  string arch = 6;
  string kernel = 7;
  string agent_version = 8;
  repeated string service_flavors = 9;
  repeated string allowed_paths = 10;
}

message NodeStatus {
  string node_id = 1;
  int64 agent_time_unix = 2;
  bool online = 3;
  double cpu_percent = 4;
  uint64 memory_used_bytes = 5;
  uint64 memory_total_bytes = 6;
  uint64 disk_used_bytes = 7;
  uint64 disk_total_bytes = 8;
  double load_1 = 9;
  double load_5 = 10;
  double load_15 = 11;
  string config_error = 12;
  repeated ServiceStatus services = 13;
}

message ServiceStatus {
  string name = 1;
  bool active = 2;
  bool listening = 3;
  uint32 listen_port = 4;
  string config_path = 5;
  string message = 6;
}

message Command {
  string command_id = 1;
  CommandType type = 2;
  int64 issued_at_unix = 3;
  int32 timeout_seconds = 4;
  oneof payload {
    ApplyConfigCommand apply_config = 10;
    RestartServiceCommand restart_service = 11;
    RestoreBackupCommand restore_backup = 12;
    HealthCheckCommand health_check = 13;
    DeregisterCommand deregister = 14;
    FileReadCommand file_read = 15;
    FileWriteCommand file_write = 16;
    FileListCommand file_list = 17;
  }
}

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_APPLY_CONFIG = 1;
  COMMAND_TYPE_RESTART_SERVICE = 2;
  COMMAND_TYPE_RESTORE_BACKUP = 3;
  COMMAND_TYPE_HEALTH_CHECK = 4;
  COMMAND_TYPE_DEREGISTER = 5;
  COMMAND_TYPE_FILE_READ = 6;
  COMMAND_TYPE_FILE_WRITE = 7;
  COMMAND_TYPE_FILE_LIST = 8;
}

message ApplyConfigCommand {
  string service_name = 1;
  string path = 2;
  bytes content = 3;
  bool restart_after_write = 4;
  bool create_backup = 5;
}

message RestartServiceCommand {
  string service_name = 1;
}

message RestoreBackupCommand {
  string service_name = 1;
  string backup_path = 2;
  bool restart_after_restore = 3;
}

message HealthCheckCommand {
  string service_name = 1;
  uint32 expected_port = 2;
}

message DeregisterCommand {
  bool stop_agent = 1;
}

message FileReadCommand {
  string path = 1;
}

message FileWriteCommand {
  string path = 1;
  bytes content = 2;
  bool create_backup = 3;
  bool restart_after_write = 4;
  string service_name = 5;
}

message FileListCommand {
  string path = 1;
}

message CommandResult {
  string node_id = 1;
  string command_id = 2;
  CommandType type = 3;
  ResultStatus status = 4;
  string message = 5;
  string stdout = 6;
  string stderr = 7;
  string backup_path = 8;
  bool changed = 9;
  bool health_check_passed = 10;
  int64 reported_at_unix = 11;
  oneof payload {
    FileReadResponse file_read = 20;
    FileWriteResponse file_write = 21;
    FileListResponse file_list = 22;
  }
}

enum ResultStatus {
  RESULT_STATUS_UNSPECIFIED = 0;
  RESULT_STATUS_SUCCESS = 1;
  RESULT_STATUS_FAILED = 2;
  RESULT_STATUS_TIMEOUT = 3;
  RESULT_STATUS_SKIPPED = 4;
}

message FileReadRequest {
  string node_id = 1;
  string path = 2;
}

message FileReadResponse {
  string path = 1;
  bytes content = 2;
  uint64 size_bytes = 3;
  int64 mod_time_unix = 4;
}

message FileWriteRequest {
  string node_id = 1;
  string path = 2;
  bytes content = 3;
  bool create_backup = 4;
  bool restart_after_write = 5;
  string service_name = 6;
}

message FileWriteResponse {
  string path = 1;
  string backup_path = 2;
  bool restarted = 3;
}

message FileListRequest {
  string node_id = 1;
  string path = 2;
}

message FileListResponse {
  repeated FileEntry entries = 1;
}

message FileEntry {
  string path = 1;
  string name = 2;
  bool is_dir = 3;
  uint64 size_bytes = 4;
  int64 mod_time_unix = 5;
}
