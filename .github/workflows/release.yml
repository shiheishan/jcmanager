name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build web assets
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build release bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          for arch in amd64 arm64; do
            bundle_dir="release/linux-${arch}"
            mkdir -p "${bundle_dir}/agents" "${bundle_dir}/web"

            GOOS=linux GOARCH="${arch}" go build -o "${bundle_dir}/jcmanager-server" ./cmd/server
            GOOS=linux GOARCH="${arch}" go build -o "${bundle_dir}/agents/jcmanager-agent-linux-${arch}" ./cmd/agent
            cp -R web/dist "${bundle_dir}/web/dist"

            tar -C "${bundle_dir}" -czf "dist/jcmanager-server-bundle-linux-${arch}.tar.gz" .
            cp "${bundle_dir}/jcmanager-server" "dist/jcmanager-server-linux-${arch}"
            cp "${bundle_dir}/agents/jcmanager-agent-linux-${arch}" "dist/jcmanager-agent-linux-${arch}"
          done

          for arch in amd64 arm64; do
            GOOS=darwin GOARCH="${arch}" go build -o "dist/jcmanager-server-darwin-${arch}" ./cmd/server
          done

          cp scripts/install-server.sh dist/install-server.sh
          chmod +x dist/install-server.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  docker-image:
    runs-on: ubuntu-latest
    needs: release-assets
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
